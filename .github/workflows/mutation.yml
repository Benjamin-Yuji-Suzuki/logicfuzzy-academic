name: Mutation Testing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo‑mutants
        run: cargo install cargo-mutants

      - name: Run cargo mutants and parse results
        id: parse
        run: |
          set -euo pipefail
          # 2 jobs paralelos → seguro para memória
          # timeout de 60s para cada mutante
          cargo mutants --jobs 2 --timeout 60 2>&1 | tee mutants.log

          # Extração segura: se grep não achar nada, assume 0
          SUMMARY=$(grep 'mutants tested in' mutants.log | tail -1 || true)
          MISSED=$(echo "$SUMMARY" | grep -oP '\d+(?= missed)' || echo 0)
          CAUGHT=$(echo "$SUMMARY" | grep -oP '\d+(?= caught)' || echo 0)
          UNVIABLE=$(echo "$SUMMARY" | grep -oP '\d+(?= unviable)' || echo 0)
          TOTAL=$((MISSED + CAUGHT + UNVIABLE))
          if [ "$TOTAL" -eq 0 ]; then
            PERCENT="0.0"
          else
            PERCENT=$(echo "scale=1; 100 * $CAUGHT / $TOTAL" | bc)
          fi
          echo "caught=$CAUGHT" >> $GITHUB_OUTPUT
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT
          echo "## Mutation score: ${PERCENT}% (${CAUGHT} caught out of ${TOTAL})" >> $GITHUB_STEP_SUMMARY

          # Cor do badge
          if (( $(echo "$PERCENT >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$PERCENT >= 60" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$PERCENT >= 40" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          cat > mutation.json <<EOF
          {
            "schemaVersion": 1,
            "label": "mutation testing",
            "message": "${PERCENT}% killed",
            "color": "${COLOR}",
            "namedLogo": "rust"
          }
          EOF

      - name: Deploy badge to mutation‑badge branch
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          # Remove branch local/remoto se existir, para recriar limpo
          git branch -D mutation-badge || true
          git push origin --delete mutation-badge || true
          git checkout --orphan mutation-badge
          git rm -rf . || true
          cp /tmp/mutation.json ./mutation.json
          git add mutation.json
          git commit -m "Update mutation score [skip ci]"
          git push origin mutation-badge --force