name: Mutation Testing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Run cargo mutants and parse results
        id: parse
        run: |
          set -euo pipefail
          cargo mutants --timeout 60 2>&1 | tee mutants.log

          # Linha de resumo (protegida contra falha)
          SUMMARY=$(grep 'mutants tested in' mutants.log | tail -1 || true)

          # Usa awk para extrair os números — portável, sem regex Perl
          MISSED=$(echo "$SUMMARY"  | awk '{for(i=1;i<=NF;i++) if($i=="missed")  print $(i-1)}')
          CAUGHT=$(echo "$SUMMARY"  | awk '{for(i=1;i<=NF;i++) if($i=="caught")  print $(i-1)}')
          UNVIABLE=$(echo "$SUMMARY" | awk '{for(i=1;i<=NF;i++) if($i=="unviable") print $(i-1)}')

          # Fallback para zero se vazio
          MISSED=${MISSED:-0}
          CAUGHT=${CAUGHT:-0}
          UNVIABLE=${UNVIABLE:-0}

          TOTAL=$((MISSED + CAUGHT + UNVIABLE))
          if [ "$TOTAL" -eq 0 ]; then
            PERCENT="0.0"
          else
            PERCENT=$(echo "scale=1; 100 * $CAUGHT / $TOTAL" | bc)
          fi

          echo "caught=$CAUGHT"   >> $GITHUB_OUTPUT
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT
          echo "## Mutation score: ${PERCENT}% (${CAUGHT} caught out of ${TOTAL})" >> $GITHUB_STEP_SUMMARY

          if   (( $(echo "$PERCENT >= 80" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$PERCENT >= 60" | bc -l) )); then COLOR="green"
          elif (( $(echo "$PERCENT >= 40" | bc -l) )); then COLOR="yellow"
          else COLOR="red"
          fi

          cat > mutation.json <<EOF
          {
            "schemaVersion": 1,
            "label": "mutation testing",
            "message": "${PERCENT}% killed",
            "color": "${COLOR}",
            "namedLogo": "rust"
          }
          EOF

      - name: Deploy badge to mutation-badge branch
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git branch -D mutation-badge 2>/dev/null || true
          git push origin --delete mutation-badge 2>/dev/null || true
          git checkout --orphan mutation-badge
          git rm -rf . || true
          cp mutation.json /tmp/mutation.json
          cp /tmp/mutation.json ./mutation.json
          git add mutation.json
          git commit -m "Update mutation score [skip ci]"
          git push origin mutation-badge --force