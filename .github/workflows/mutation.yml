name: Mutation Testing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo‑mutants
        run: cargo install cargo-mutants

      - name: Run cargo mutants and parse results
        id: parse
        shell: bash {0}
        run: |
          cargo mutants --timeout 60 2>&1 | tee mutants.log

          # DEBUG: mostra a linha de resumo encontrada
          SUMMARY=$(grep 'mutants tested in' mutants.log | tail -1 || true)
          echo "DEBUG SUMMARY=[$SUMMARY]"

          # Extração usando grep + sed (mais simples e portável)
          MISSED=$(echo "$SUMMARY" | grep -o '[0-9]* missed' | head -1 | sed 's/ missed//' || echo 0)
          CAUGHT=$(echo "$SUMMARY" | grep -o '[0-9]* caught' | head -1 | sed 's/ caught//' || echo 0)
          UNVIABLE=$(echo "$SUMMARY" | grep -o '[0-9]* unviable' | head -1 | sed 's/ unviable//' || echo 0)

          echo "DEBUG MISSED=$MISSED CAUGHT=$CAUGHT UNVIABLE=$UNVIABLE"

          MISSED=${MISSED:-0}
          CAUGHT=${CAUGHT:-0}
          UNVIABLE=${UNVIABLE:-0}

          TOTAL=$((MISSED + CAUGHT + UNVIABLE))
          PERCENT="0.0"
          if [ "$TOTAL" -gt 0 ]; then
            PERCENT=$(echo "scale=1; 100 * $CAUGHT / $TOTAL" | bc || echo "0.0")
          fi

          echo "DEBUG PERCENT=$PERCENT"

          echo "caught=$CAUGHT" >> $GITHUB_OUTPUT
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT
          echo "## Mutation score: ${PERCENT}% (${CAUGHT} caught out of ${TOTAL})" >> $GITHUB_STEP_SUMMARY

          if (( $(echo "$PERCENT >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$PERCENT >= 60" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$PERCENT >= 40" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          cat > mutation.json <<EOF
          {
            "schemaVersion": 1,
            "label": "mutation testing",
            "message": "${PERCENT}% killed",
            "color": "${COLOR}",
            "namedLogo": "rust"
          }
          EOF

      - name: Deploy badge to mutation‑badge branch
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git branch -D mutation-badge || true
          git push origin --delete mutation-badge || true
          git checkout --orphan mutation-badge
          git rm -rf . || true
          cp mutation.json /tmp/mutation.json
          cp /tmp/mutation.json ./mutation.json
          git add mutation.json
          git commit -m "Update mutation score [skip ci]"
          git push origin mutation-badge --force
