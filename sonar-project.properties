# Unique project key – usually repo owner and repo name
sonar.projectKey=Benjamin-Yuji-Suzuki_logicfuzzy-academic
sonar.organization=benjamin-yuji-suzuki

# Rust settings
sonar.language=rust
sonar.sources=src
sonar.tests=tests

# Path to coverage report (generated by cargo-llvm-cov)
sonar.coverageReportPaths=lcov.info

# Encoding and other defaults
sonar.sourceEncoding=UTF-8

# Disable built-in Clippy sensor (we run clippy in CI)
sonar.rust.clippy.disable=true
